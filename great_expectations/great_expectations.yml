config_version: 3.0

datasources:
  spark_s3:
    class_name: Datasource
    execution_engine:
      class_name: SparkDFExecutionEngine
      spark_config:
        spark.master: local[*]
        spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
        spark.hadoop.fs.s3a.endpoint: http://minio:9000
        spark.hadoop.fs.s3a.access.key: minio
        spark.hadoop.fs.s3a.secret.key: change_me_local
        spark.hadoop.fs.s3a.path.style.access: "true"
        spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
    data_connectors:
      default_runtime_data_connector_name:
        class_name: RuntimeDataConnector
        name: default_runtime_data_connector_name
      default_inferred_data_connector_name:
        class_name: InferredAssetS3DataConnector
        name: default_inferred_data_connector_name
        bucket: lake
        prefix: bronze/chicago_crime

stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/expectations

  validations_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/validations

  evaluation_parameter_store:
    class_name: EvaluationParameterStore

  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: great_expectations/checkpoints

expectations_store_name: expectations_store
validations_store_name: validations_store
evaluation_parameter_store_name: evaluation_parameter_store
checkpoint_store_name: checkpoint_store

data_docs_sites:
  local_site:
    class_name: SiteIndexBuilder
    show_how_to_embeddings: false
    site_index_builder:
      class_name: SiteIndexBuilder
      show_cta_footer: false
