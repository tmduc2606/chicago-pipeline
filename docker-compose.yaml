name: chicago-pipeline

services:
  # ---------- object store ----------
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: ccp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: ccp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/lake &&
      mc mb --ignore-existing local/lake/bronze &&
      mc mb --ignore-existing local/lake/silver &&
      mc mb --ignore-existing local/lake/gold &&
      mc anonymous set download local/lake/gold
      "
    restart: "no"

  # ---------- warehouse + cache ----------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ccp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ccp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- processing ----------
  spark-master:
    build: ./docker/spark
    image: ccp-spark:3.5.1
    container_name: ccp-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./pipeline:/opt/pipeline
      - ./great_expectations:/opt/great_expectations
      - ./dbt:/opt/dbt
      - ./data:/data
      - ./contracts:/opt/contracts:ro
      - ./scripts:/opt/scripts:ro
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./Makefile:/opt/Makefile:ro
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  spark-worker:
    build: ./docker/spark
    image: ccp-spark:3.5.1
    container_name: ccp-spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipeline:/opt/pipeline
      - ./great_expectations:/opt/great_expectations
      - ./dbt:/opt/dbt
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
    restart: unless-stopped

  # ---------- pipeline init (runs on every startup) ----------
  pipeline-init:
    image: ccp-spark:3.5.1
    container_name: ccp-pipeline-init
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pipeline:/opt/pipeline
      - ./dbt:/opt/dbt
      - ./scripts:/opt/scripts:ro
      - ./data:/data
    command: ["/opt/scripts/pipeline_init.sh"]
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  # ---------- orchestration ----------
  airflow-webserver:
    build: ./airflow
    container_name: ccp-airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEB_SECRET}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - ./pipeline:/opt/pipeline
      - ./great_expectations:/opt/great_expectations
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  airflow-scheduler:
    build: ./airflow
    container_name: ccp-airflow-scheduler
    depends_on:
      airflow-webserver:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - ./pipeline:/opt/pipeline
      - ./great_expectations:/opt/great_expectations
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # ---------- API ----------
  api:
    build: ./api
    container_name: ccp-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      API_POSTGRES_HOST: postgres
      API_POSTGRES_PORT: 5432
      API_POSTGRES_DB: ${POSTGRES_DB}
      API_POSTGRES_USER: ${POSTGRES_USER}
      API_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_REDIS_HOST: redis
      API_REDIS_PORT: 6379
      API_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      API_AIRFLOW_BASE_URL: http://airflow-webserver:8080
      API_AIRFLOW_USER: ${AIRFLOW_ADMIN_USER}
      API_AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      API_ENV: ${ENV:-local}
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/opt/app/app
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------- Web ----------
  web:
    build: ./web
    container_name: ccp-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5173/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ---------- E2E Tests ----------
  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: ccp-playwright
    working_dir: /app
    ipc: host
    init: true
    depends_on:
      web:
        condition: service_healthy
    environment:
      - BASE_URL=http://web:5173
      - CI=true
    volumes:
      - ./web/e2e:/app/e2e
      - ./web/playwright.config.ts:/app/playwright.config.ts
      - ./web/package.json:/app/package.json
      - ./web/package-lock.json:/app/package-lock.json
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    command: bash -c "npm ci && npx playwright test"
    profiles:
      - test
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  # ---------- observability ----------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ccp-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ccp-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

  # ---------- lineage ----------
  marquez:
    image: marquezproject/marquez:0.30.0
    container_name: ccp-marquez
    environment:
      MARQUEZ_CONFIG: /opt/marquez/marquez.yml
    volumes:
      - ./lineage/marquez.yml:/opt/marquez/marquez.yml:ro
    ports:
      - "3001:3000"
      - "3002:5000"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
