name: chicago-pipeline-lite

services:
  # ---------- object store ----------
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: ccp-minio-lite
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: ccp-minio-init-lite
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/lake &&
      mc mb --ignore-existing local/lake/bronze &&
      mc mb --ignore-existing local/lake/silver &&
      mc mb --ignore-existing local/lake/gold &&
      mc anonymous set download local/lake/gold
      "
    restart: "no"

  # ---------- warehouse + cache ----------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ccp-postgres-lite
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ccp-redis-lite
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- processing ----------
  spark-master:
    build: ./docker/spark
    image: ccp-spark:3.5.1
    container_name: ccp-spark-master-lite
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./pipeline:/opt/pipeline
      - ./great_expectations:/opt/great_expectations
      - ./dbt:/opt/dbt
      - ./data:/data
      - ./contracts:/opt/contracts:ro
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  spark-worker:
    build: ./docker/spark
    image: ccp-spark:3.5.1
    container_name: ccp-spark-worker-lite
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1g
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./pipeline:/opt/pipeline
      - ./great_expectations:/opt/great_expectations
      - ./dbt:/opt/dbt
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    restart: unless-stopped

  # ---------- API ----------
  api:
    build: ./api
    container_name: ccp-api-lite
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      API_POSTGRES_HOST: postgres
      API_POSTGRES_PORT: 5432
      API_POSTGRES_DB: ${POSTGRES_DB}
      API_POSTGRES_USER: ${POSTGRES_USER}
      API_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_REDIS_HOST: redis
      API_REDIS_PORT: 6379
      API_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      API_ENV: ${ENV:-local}
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/opt/app/app
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------- observability (minimal) ----------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ccp-prometheus-lite
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
