# Pre-commit hooks for chicago-pipeline
# Install: `pip install pre-commit && pre-commit install`
# Run on demand: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: no-commit-to-branch
        args: ["--branch=main"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: '^(pipeline|api)/.*\.py$'
      - id: ruff-format
        files: '^(pipeline|api)/.*\.py$'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: '^(pipeline|api)/.*\.py$'
        additional_dependencies: ["pydantic>=2"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown, ts, tsx, css]
        exclude: '^(dbt/target|web/playwright-report|web/test-results)/'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
