name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_DOCKER_CLI_BUILD: 1
  DOCKER_BUILDKIT: 1

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Lint (fastest feedback)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff mypy

      - name: API Lint (ruff)
        run: ruff check api/app/
        working-directory: .

      - name: API Type Check (mypy)
        run: mypy api/app/ --ignore-missing-imports
        working-directory: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Web Lint (eslint)
        run: pnpm lint
        working-directory: web

      - name: Web Type Check (tsc)
        run: pnpm typecheck
        working-directory: web

  # ──────────────────────────────────────────────
  # Phase 2: Contracts validation
  # ──────────────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml openapi-spec-validator

      - name: Validate OpenAPI spec
        run: python -c "
          import yaml, json
          from openapi_spec_validator import validate
          with open('contracts/openapi.yaml') as f:
              spec = yaml.safe_load(f)
          validate(spec)
          print('OpenAPI spec is valid')
          "

      - name: Validate agent files
        run: |
          for dir in agents/*/; do
            for f in AGENTS.md PROMPT.md CONTRACTS.md; do
              if [ ! -f "${dir}${f}" ]; then
                echo "MISSING: ${dir}${f}"
                exit 1
              fi
            done
          done
          echo "All agent files present"

  # ──────────────────────────────────────────────
  # Phase 3: Security scanning
  # ──────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Phase 4: Unit tests (API + Web)
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: chicago
          POSTGRES_USER: chicago
          POSTGRES_PASSWORD: chicago
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U chicago"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        run: pip install -r api/requirements.txt
        working-directory: .

      - name: API Tests
        run: pytest tests/ -q --cov=app --cov-report=term-missing
        working-directory: api
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: chicago
          POSTGRES_USER: chicago
          POSTGRES_PASSWORD: chicago
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Web Tests
        run: pnpm test -- --run
        working-directory: web

  # ──────────────────────────────────────────────
  # Phase 5: E2E tests (Playwright)
  # ──────────────────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [test, contracts]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libatspi2.0-0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web

      - name: Build web
        run: pnpm build
        working-directory: web

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: web
        env:
          CI: true

  # ──────────────────────────────────────────────
  # Phase 6: Agent file validation
  # ──────────────────────────────────────────────
  agents:
    name: Agent Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent structure
        run: |
          ERRORS=0
          for dir in agents/*/; do
            role=$(basename "$dir")
            for f in AGENTS.md PROMPT.md CONTRACTS.md; do
              if [ ! -f "${dir}${f}" ]; then
                echo "MISSING: ${dir}${f}"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Failed: $ERRORS missing files"
            exit 1
          fi
          echo "All agent files valid"

      - name: Check CODEOWNERS
        run: |
          if [ ! -f CODEOWNERS ]; then
            echo "MISSING: CODEOWNERS"
            exit 1
          fi
          echo "CODEOWNERS present"
