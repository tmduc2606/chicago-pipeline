global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.rules.yml"

scrape_configs:
  - job_name: "airflow"
    static_configs:
      - targets: ["ccp-airflow-webserver:8080"]
    metrics_path: "/metrics"

  - job_name: "api"
    static_configs:
      - targets: ["ccp-api:8000"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["ccp-postgres:5432"]

  - job_name: "minio"
    static_configs:
      - targets: ["ccp-minio:9000"]
    metrics_path: "/minio/v2/metrics/cluster"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
